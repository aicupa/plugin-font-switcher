<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Font Switcher</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 10px;
      margin: 0;
      background: transparent;
      color: #ccc;
      height: auto;
      overflow: hidden;
    }

    .container {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    select,
    button {
      background: #1e1e1e;
      border: 1px solid #383838;
      color: #fff;
      padding: 5px 10px;
      border-radius: 4px;
      outline: none;
    }

    button {
      background: #007acc;
      cursor: pointer;
      border: none;
    }

    button:hover {
      background: #0062a3;
    }

    label {
      font-size: 12px;
      font-weight: 500;
      color: #888;
    }
  </style>
</head>

<body>

  <div class="container">
    <label>Theme Font Style:</label>
    <select id="fontSelect">
      <option value="system">默认系统</option>

      <option value="pingfang">
        苹果苹方
      </option>

      <option value="yahei">
        微软雅黑
      </option>

      <option value="dengxian">
        等线
      </option>

      <option value="kaiti">
        楷体
      </option>

      <option value="songti">
        宋体
      </option>

      <option value="mono">
        极客代码风
      </option>

      <option value="notebook">
        手账风
      </option>

      <option value="minimal">
        极简风
      </option>

      <option value="cyber">
        赛博朋克
      </option>
    </select>
    <button onclick="applyFont()">Apply Font</button>
  </div>

  <script>
    let callId = 0;
    const pending = {};
    let currentFilePath = '';

    function callPlugin(method, params) {
      return new Promise((resolve, reject) => {
        const id = ++callId;
        const timer = setTimeout(() => { delete pending[id]; reject(new Error('timeout')); }, 2000);
        pending[id] = {
          resolve: (v) => { clearTimeout(timer); resolve(v); },
          reject: (e) => { clearTimeout(timer); reject(e); }
        };
        window.parent.postMessage({ type: 'plugin-call', id, method, params }, '*');
      });
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (msg?.type === 'plugin-init') {
        currentFilePath = msg.filePath || '';
        if (msg.theme?.color) document.body.style.color = msg.theme.color;

        const savedFont = localStorage.getItem('active_font_preset');
        if (savedFont) {
          document.getElementById('fontSelect').value = savedFont;
        }
      }
      if (msg?.type === 'plugin-result' && pending[msg.id]) {
        const { resolve, reject } = pending[msg.id];
        delete pending[msg.id];
        msg.error ? reject(new Error(msg.error)) : resolve(msg.result);
      }
    });

    function applyFont() {
      const preset =
        document.getElementById(
          "fontSelect"
        ).value;

      localStorage.setItem(
        "active_font_preset",
        preset
      );

      callPlugin('relaunchToUpdate')
    }
  </script>
</body>

</html>
